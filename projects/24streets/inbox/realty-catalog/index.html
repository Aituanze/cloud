<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>24streets</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ══════════ ЭКРАН 1: Hero ══════════ -->
<div id="screen-hero" class="screen screen-hero">
  <div class="hero-wrap">
    <img class="hero-img" src="img/first-page.png" alt="Алматы">
    <div id="deal-toggle" class="deal-toggle">
      <button class="dt-btn active-sale" data-deal="продажа">🏷 Продажа</button>
      <button class="dt-btn" data-deal="аренда">🔑 Аренда</button>
    </div>
    <div id="bubbles"></div>
  </div>
  <div class="custom-tabs">
    <div class="ctab active"><span class="ci">🏠</span><span class="cl">Каталог</span></div>
    <div class="ctab"><span class="ci">🔍</span><span class="cl">Поиск</span></div>
    <div class="ctab"><span class="ci">❤️</span><span class="cl">Избранное</span></div>
  </div>
</div>

<!-- ══════════ ЭКРАН 2: Категории ══════════ -->
<div id="screen-cats" class="screen screen-scroll">
  <div class="navbar-custom">
    <button id="btn-back-cats" class="nb-back">‹</button>
    <span class="nb-title">Все районы</span>
    <span id="cats-deal-badge" class="nb-badge">Продажа</span>
  </div>
  <div id="cats-body" class="scroll-area"></div>
  <div class="custom-tabs">
    <div class="ctab active"><span class="ci">🏠</span><span class="cl">Каталог</span></div>
    <div class="ctab"><span class="ci">🔍</span><span class="cl">Поиск</span></div>
    <div class="ctab"><span class="ci">❤️</span><span class="cl">Избранное</span></div>
  </div>
</div>

<!-- ══════════ ЭКРАН 3: Комнатность ══════════ -->
<div id="screen-rooms" class="screen screen-scroll">
  <div class="navbar-custom">
    <button id="btn-back-rooms" class="nb-back">‹</button>
    <span id="rooms-title" class="nb-title">Квартиры</span>
    <span id="rooms-badge" class="nb-badge">0</span>
  </div>
  <div class="scroll-area">
    <div class="rooms-head">
      <h2>Комнатность</h2>
    </div>
    <div id="rooms-grid" class="rooms-grid"></div>
  </div>
  <div class="custom-tabs">
    <div class="ctab active"><span class="ci">🏠</span><span class="cl">Каталог</span></div>
    <div class="ctab"><span class="ci">🔍</span><span class="cl">Поиск</span></div>
    <div class="ctab"><span class="ci">❤️</span><span class="cl">Избранное</span></div>
  </div>
</div>

<!-- ══════════ ЭКРАН 4: Объявления ══════════ -->
<div id="screen-list" class="screen screen-scroll">
  <div class="navbar-custom">
    <button id="btn-back-list" class="nb-back">‹</button>
    <span id="list-title" class="nb-title">Объявления</span>
    <span id="list-badge" class="nb-badge">0 шт</span>
  </div>
  <div id="list-body" class="scroll-area"></div>
  <div class="custom-tabs">
    <div class="ctab active"><span class="ci">🏠</span><span class="cl">Каталог</span></div>
    <div class="ctab"><span class="ci">🔍</span><span class="cl">Поиск</span></div>
    <div class="ctab"><span class="ci">❤️</span><span class="cl">Избранное</span></div>
  </div>
</div>

<script src="data/listings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
