<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>realty-quick-match — быстрый поиск недвижимости (Алматы)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
</head>
<body>
  <div id="app">
    <main id="screen" class="screen"><!-- сюда рендерятся экраны --></main>
    <nav id="tabbar" class="tabbar">
      <button class="tab" data-screen="menu" aria-label="Лента"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="7.5" rx="2.2"/><rect x="4" y="13.5" width="16" height="7.5" rx="2.2"/></svg><span>Лента</span></button>
      <button class="tab" data-screen="map" aria-label="Карта"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 4 6v14l5-2 6 2 5-2V4l-5 2-6-2Z"/><path d="M9 4v14M15 6v14"/></svg><span>Карта</span></button>
      <button class="tab" data-screen="search" aria-label="Поиск"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"/><path d="M20.5 20.5 17 17"/></svg><span>Поиск</span></button>
      <button class="tab tab--add" data-screen="add" aria-label="Добавить"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
      <button class="tab" data-screen="saved" aria-label="Сохранённое"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4V4Z"/></svg><span>Сохранённое</span></button>
      <button class="tab" data-screen="profile" aria-label="Профиль"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span>Профиль</span></button>
    </nav>
  </div>
  <script src="data/districts.js"></script>
  <script src="data/agents.js"></script>
  <script src="data/listings.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/mortgage.js"></script>
  <script src="js/search-screen.js"></script>
  <script src="js/map.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/lead.js"></script>
  <script src="js/share.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/rating.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/saved.js"></script>
</body>
</html>
