name: Deploy agnt.24

on:
  push:
    branches: [main]
    paths:
      - 'projects/agnt-24-app/**'
      - 'projects/agnt-24/inbox/realty-catalog/**'
      - 'projects/agnt-24/inbox/realty-quick-match/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r projects/agnt-24-app/. _site/
          mkdir -p _site/catalog
          cp -r projects/agnt-24/inbox/realty-catalog/. _site/catalog/
          mkdir -p _site/quick-match
          cp -r projects/agnt-24/inbox/realty-quick-match/. _site/quick-match/

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
