name: Deploy 24Streets

on:
  push:
    branches: [main]
    paths:
      - 'projects/24streets-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload 24streets-app
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/24streets-app

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
